<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ลงเวลา — Mini HR App</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans Thai', system-ui, sans-serif;
    background: #FFF8F0;
    color: #1A1A1A;
    padding: 16px;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #D4550A, #F28C28);
    color: #fff;
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 16px;
  }

  .header h1 {
    font-size: 22px;
  }

  .header-desc {
    opacity: 0.9;
    font-size: 14px;
    margin-top: 4px;
    line-height: 1.3;
  }

  .header-en {
    font-size: 11px;
    opacity: 0.75;
    margin-top: 4px;
  }

  .slot-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .slot-btn {
    background: #fff;
    border: 2px solid #E0D0C0;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  .slot-btn-text {
    display: block;
  }

  .slot-btn-en {
    font-size: 10px;
    color: #AAA;
    margin-top: 3px;
    opacity: 0.8;
  }

  .slot-btn.active {
    background: #D4550A;
    color: #fff;
    border-color: #D4550A;
  }

  .slot-btn.active .slot-btn-en {
    color: #FFD9B3;
  }

  .info-box {
    background: #fff;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 16px;
    border-left: 4px solid #F28C28;
  }

  .info-box .label {
    font-size: 12px;
    color: #777;
    margin-bottom: 4px;
  }

  .info-box .label-en {
    font-size: 10px;
    color: #AAA;
    opacity: 0.8;
  }

  .info-box .value {
    font-size: 15px;
    font-weight: 600;
    margin-top: 4px;
    white-space: pre-line;
    line-height: 1.5;
  }

  .info-box.warn {
    border-color: #B23A3A;
    background: #FFF0F0;
  }

  .info-box.ok {
    border-color: #1F7A1F;
    background: #F0FFF0;
  }

  .company-badge {
    display: inline-block;
    background: #1F7A1F;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    margin-top: 4px;
  }

  .camera-section {
    background: #fff;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 16px;
    text-align: center;
  }

  .preview {
    width: 100%;
    max-width: 320px;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
  }

  /*
    [FIX] ใช้ <button> ธรรมดา + JS .click() บน input ที่ซ่อนอยู่
    วิธีนี้ทำงานได้ใน LINE LIFF WebView ทุกเวอร์ชัน
    ไม่ใช้ <label> ครอบ <input> เพราะ LIFF บางเวอร์ชันบล็อก event chain
  */
  .btn-camera {
    background: #06C755;
    color: #fff;
    border: none;
    padding: 14px 24px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    display: block;
    text-align: center;
  }

  .btn-camera:active {
    opacity: 0.85;
  }

  /*
    [FIX] ซ่อน input โดยไม่ใช้ display:none (บาง WebView ไม่เปิด file picker)
    ใช้ position:absolute + opacity:0 + pointer-events:none แทน
  */
  .hidden-file-input {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
  }

  .btn-submit {
    background: #D4550A;
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    width: 100%;
    cursor: pointer;
    margin-top: 8px;
  }

  .btn-submit:disabled {
    background: #AAA;
    cursor: not-allowed;
  }

  #status {
    margin-top: 16px;
    padding: 14px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
    display: none;
    white-space: pre-line;
  }

  #status.show {
    display: block;
  }

  #status.success {
    background: #1F7A1F;
    color: #fff;
  }

  #status.error {
    background: #B23A3A;
    color: #fff;
  }

  #status.loading {
    background: #F2A640;
    color: #fff;
  }

  .retry-btn {
    background: #D4550A;
    color: #fff;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 8px;
    font-size: 12px;
  }
</style>
</head>

<body>

<div class="header">
  <h1>📍 ลงเวลา</h1>
  <div class="header-desc">
    เปิดกล้อง · GPS lock · ฝัง watermark อัตโนมัติ
    <div class="header-en">Camera · GPS · Auto Watermark</div>
  </div>
</div>

<div class="slot-selector">
  <button type="button" class="slot-btn active" data-slot="IN">
    <span class="slot-btn-text">🌅 เข้างาน</span>
    <span class="slot-btn-en">Check In</span>
  </button>

  <button type="button" class="slot-btn" data-slot="LUNCH_OUT">
    <span class="slot-btn-text">🍽️ พักเที่ยง</span>
    <span class="slot-btn-en">Lunch Out</span>
  </button>

  <button type="button" class="slot-btn" data-slot="LUNCH_IN">
    <span class="slot-btn-text">↩️ กลับจากพัก</span>
    <span class="slot-btn-en">Lunch In</span>
  </button>

  <button type="button" class="slot-btn" data-slot="OUT">
    <span class="slot-btn-text">👋 เลิกงาน</span>
    <span class="slot-btn-en">Check Out</span>
  </button>
</div>

<div class="info-box" id="gpsBox">
  <div class="label">
    📡 GPS
    <div class="label-en">Location</div>
  </div>
  <div class="value" id="gpsValue">
    กำลังขอตำแหน่ง...
  </div>
  <div id="companyBadge" style="display:none">
    <span class="company-badge">🏢 GRANDVANCE TECHNOLOGY (THAILAND) CO., LTD.</span>
  </div>
</div>

<div class="camera-section">
  <!--
    [FIX] แยก input และ button ออกจากกัน
    - input ซ่อนด้วย .hidden-file-input (ไม่ใช้ display:none)
    - button เรียก input.click() ผ่าน JS โดยตรง
    - capture="user" บังคับเปิดกล้องเท่านั้น (ไม่มี accept="image/*" ร่วม
      เพราะบาง Android WebView จะ override capture เป็นแกลเลอรีแทน)
  -->
  <input
    type="file"
    id="fileInput"
    capture="user"
    class="hidden-file-input"
  >
  <button
    type="button"
    class="btn-camera"
    onclick="document.getElementById('fileInput').click()"
  >
    📸 ถ่ายรูปสด (กล้องเท่านั้น)
  </button>

  <img id="preview" class="preview" alt="preview">
</div>

<button class="btn-submit" id="btnSubmit" disabled>
  ส่งลงเวลา
</button>

<div id="status"></div>

<script>
  /* ══════════════════════════════════════════════
     CONFIG
  ══════════════════════════════════════════════ */
  var LIFF_ID = '2010077723-35YjoRoE';
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBkocmZN1yPzozv74oJAq3-qbKky0-KM9a1ZTUrajg6Qh5eaJIikrB4vJcttXr_UWS/exec';

  var COMPANY = {
    name:      'GRANDVANCE TECHNOLOGY (THAILAND) CO., LTD.',
    lat:       13.59825,
    lng:       100.70730,
    radiusM:   200
  };

  /* ══════════════════════════════════════════════
     STATE
  ══════════════════════════════════════════════ */
  var currentSlot  = 'IN';
  var gpsCoords    = null;
  var gpsError     = null;
  var imageBase64  = null;
  var userId       = null;
  var locationName = '';

  /* ══════════════════════════════════════════════
     SLOT BUTTONS
  ══════════════════════════════════════════════ */
  document.querySelectorAll('.slot-btn').forEach(function(btn) {
    btn.onclick = function() {
      document.querySelectorAll('.slot-btn').forEach(function(b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      currentSlot = btn.dataset.slot;
    };
  });

  /* ══════════════════════════════════════════════
     FILE INPUT CHANGE
  ══════════════════════════════════════════════ */
  document.getElementById('fileInput').addEventListener('change', async function(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    await processImage(file);
  });

  /* ══════════════════════════════════════════════
     SUBMIT BUTTON
  ══════════════════════════════════════════════ */
  document.getElementById('btnSubmit').addEventListener('click', async function() {
    await submitCheckin();
  });

  /* ══════════════════════════════════════════════
     LIFF INIT
  ══════════════════════════════════════════════ */
  (async function init() {
    try {
      if (!LIFF_ID || LIFF_ID === '') {
        showStatus('❌ ยังไม่ได้ตั้งค่า LIFF_ID ใน Code.gs', 'error');
        return;
      }
      await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      var profile = await liff.getProfile();
      userId = profile.userId;
      if (!userId) {
        showStatus('❌ ไม่พบ LINE user id', 'error');
        return;
      }
      requestGPS();
      checkCanSubmit();
    } catch (err) {
      console.error(err);
      showStatus('❌ LIFF Error: ' + err.message, 'error');
    }
  })();

  /* ══════════════════════════════════════════════
     GPS
  ══════════════════════════════════════════════ */
  function requestGPS() {
    if (!navigator.geolocation) {
      gpsError = 'unsupported';
      document.getElementById('gpsValue').textContent = '❌ อุปกรณ์ไม่รองรับ GPS';
      document.getElementById('gpsBox').classList.add('warn');
      checkCanSubmit();
      return;
    }

    document.getElementById('gpsValue').textContent = '🔄 กำลังค้นหาตำแหน่ง...';

    navigator.geolocation.getCurrentPosition(
      function(pos) {
        gpsCoords = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        };
        gpsError = null;

        var coordText = gpsCoords.lat.toFixed(5) + ', ' + gpsCoords.lng.toFixed(5);
        var distM = getDistanceM(gpsCoords.lat, gpsCoords.lng, COMPANY.lat, COMPANY.lng);
        var atCompany = distM <= COMPANY.radiusM;

        if (atCompany) {
          locationName = COMPANY.name;
          document.getElementById('gpsValue').textContent =
            '✅ ' + COMPANY.name + '\n(' + coordText + ')';
          document.getElementById('companyBadge').style.display = 'block';
        } else {
          document.getElementById('gpsValue').textContent =
            '✅ ' + coordText + '\n🔍 กำลังค้นหาชื่อสถานที่...';
          document.getElementById('companyBadge').style.display = 'none';

          reverseGeocode(gpsCoords.lat, gpsCoords.lng).then(function(placeName) {
            if (placeName) {
              locationName = placeName;
              document.getElementById('gpsValue').textContent =
                '✅ ' + placeName + '\n(' + coordText + ')';
            } else {
              locationName = coordText;
              document.getElementById('gpsValue').textContent = '✅ ' + coordText;
            }
          }).catch(function() {
            locationName = coordText;
            document.getElementById('gpsValue').textContent = '✅ ' + coordText;
          });
        }

        document.getElementById('gpsBox').classList.remove('warn');
        document.getElementById('gpsBox').classList.add('ok');
        checkCanSubmit();
      },
      function(err) {
        gpsCoords = null;
        if (err.code === 1) {
          gpsError = 'permission_denied';
        } else if (err.code === 2) {
          gpsError = 'position_unavailable';
        } else if (err.code === 3) {
          gpsError = 'timeout';
        } else {
          gpsError = 'unknown';
        }
        document.getElementById('gpsValue').innerHTML =
          '❌ เปิด GPS ไม่สำเร็จ<br><button class="retry-btn" onclick="requestGPS()">ลองใหม่</button>';
        document.getElementById('gpsBox').classList.add('warn');
        checkCanSubmit();
      },
      {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      }
    );
  }

  /* ══════════════════════════════════════════════
     คำนวณระยะทาง (Haversine formula) — เมตร
  ══════════════════════════════════════════════ */
  function getDistanceM(lat1, lng1, lat2, lng2) {
    var R = 6371000;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLng = (lng2 - lng1) * Math.PI / 180;
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLng / 2) * Math.sin(dLng / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  /* ══════════════════════════════════════════════
     Reverse Geocode — OpenStreetMap Nominatim
  ══════════════════════════════════════════════ */
  function reverseGeocode(lat, lng) {
    var url = 'https://nominatim.openstreetmap.org/reverse'
      + '?format=json'
      + '&lat=' + lat
      + '&lon=' + lng
      + '&zoom=18'
      + '&addressdetails=1';

    return fetch(url, {
      headers: { 'Accept-Language': 'th,en' }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (!data || !data.address) return null;

      var addr = data.address;
      var name = data.name
        || addr.amenity
        || addr.shop
        || addr.building
        || addr.office
        || addr.tourism
        || addr.leisure;

      var road    = addr.road || addr.pedestrian || addr.footway || '';
      var suburb  = addr.suburb || addr.neighbourhood || addr.quarter || '';
      var city    = addr.city || addr.town || addr.village || addr.county || '';
      var state   = addr.state || '';

      var parts = [];
      if (name)   parts.push(name);
      if (road)   parts.push(road);
      if (suburb) parts.push(suburb);
      if (city)   parts.push(city);

      return parts.length > 0 ? parts.slice(0, 3).join(', ') : (city || state || null);
    })
    .catch(function(err) {
      console.error('Reverse geocode error:', err);
      return null;
    });
  }

  /* ══════════════════════════════════════════════
     PROCESS IMAGE — resize + watermark
  ══════════════════════════════════════════════ */
  async function processImage(file) {
    var img = await loadImage(file);
    var canvas = document.createElement('canvas');
    var maxW = 800;

    if (img.width > maxW) {
      canvas.width  = maxW;
      canvas.height = Math.round((maxW / img.width) * img.height);
    } else {
      canvas.width  = img.width;
      canvas.height = img.height;
    }

    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    var barH = Math.max(80, canvas.height * 0.10);
    ctx.fillStyle = 'rgba(0,0,0,0.68)';
    ctx.fillRect(0, canvas.height - barH, canvas.width, barH);

    var now      = new Date();
    var datetime = now.toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' });
    var coordTxt = gpsCoords
      ? gpsCoords.lat.toFixed(5) + ', ' + gpsCoords.lng.toFixed(5)
      : 'GPS unavailable';

    var placeLine = locationName || coordTxt;

    var fontSize = Math.floor(barH * 0.22);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold ' + fontSize + 'px sans-serif';

    ctx.fillText('🕐 ' + datetime,  12, canvas.height - barH + barH * 0.32);
    ctx.fillText('📍 ' + placeLine, 12, canvas.height - barH + barH * 0.60);

    if (locationName && locationName !== coordTxt) {
      ctx.font = (fontSize - 2) + 'px sans-serif';
      ctx.fillStyle = '#FFD9B3';
      ctx.fillText('    (' + coordTxt + ')', 12, canvas.height - barH + barH * 0.85);
    }

    var dataUrl = canvas.toDataURL('image/jpeg', 0.65);
    imageBase64 = dataUrl.split(',')[1];

    var preview = document.getElementById('preview');
    preview.src = dataUrl;
    preview.style.display = 'block';

    checkCanSubmit();
  }

  function loadImage(file) {
    return new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function() {
        var img = new Image();
        img.onload = function() { resolve(img); };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  /* ══════════════════════════════════════════════
     CHECK CAN SUBMIT
  ══════════════════════════════════════════════ */
  function checkCanSubmit() {
    var canSubmit = !!imageBase64 && !!userId;
    document.getElementById('btnSubmit').disabled = !canSubmit;
  }

  /* ══════════════════════════════════════════════
     SUBMIT CHECKIN
  ══════════════════════════════════════════════ */
  async function submitCheckin() {
    if (!userId) {
      showStatus('❌ missing_line_user_id', 'error');
      return;
    }
    if (!imageBase64) {
      showStatus('❌ กรุณาถ่ายรูปก่อน', 'error');
      return;
    }

    showStatus('⏳ กำลังส่งข้อมูล...', 'loading');
    document.getElementById('btnSubmit').disabled = true;

    var payload = {
      action:       'checkin',
      lineUserId:   userId,
      lat:          gpsCoords ? gpsCoords.lat : 0,
      lng:          gpsCoords ? gpsCoords.lng : 0,
      locationName: locationName || '',
      selfieBase64: imageBase64,
      slot:         currentSlot
    };

    try {
      var res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      var json = await res.json();

      if (json.ok) {
        showStatus('✅ ลงเวลาเรียบร้อย', 'success');
        setTimeout(function() {
          if (window.liff) {
            liff.closeWindow();
          }
        }, 2500);
      } else {
        showStatus('❌ ' + (json.message || json.error || 'เกิดข้อผิดพลาด'), 'error');
        checkCanSubmit();
      }
    } catch (err) {
      console.error(err);
      showStatus('❌ ' + err.message, 'error');
      checkCanSubmit();
    }
  }

  /* ══════════════════════════════════════════════
     SHOW STATUS
  ══════════════════════════════════════════════ */
  function showStatus(text, level) {
    var el = document.getElementById('status');
    el.textContent = text;
    el.className = 'show ' + level;
  }
</script>
</body>
</html>
