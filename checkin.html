<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ลงเวลา</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans Thai', system-ui, sans-serif;
    background: #FFF8F0;
    color: #1A1A1A;
    padding: 16px;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #D4550A, #F28C28);
    color: #fff;
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 16px;
  }
  .header h1 { font-size: 22px; }
  .header-desc { opacity: 0.9; font-size: 14px; margin-top: 4px; line-height: 1.3; }
  .header-en { font-size: 11px; opacity: 0.75; margin-top: 4px; }

  .slot-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .slot-btn {
    background: #fff;
    border: 2px solid #E0D0C0;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .slot-btn-text { display: block; }
  .slot-btn-en { font-size: 10px; color: #AAA; margin-top: 3px; opacity: 0.8; }
  .slot-btn.active { background: #D4550A; color: #fff; border-color: #D4550A; }
  .slot-btn.active .slot-btn-en { color: #FFD9B3; }

  .info-box {
    background: #fff;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 16px;
    border-left: 4px solid #F28C28;
  }
  .info-box .label { font-size: 12px; color: #777; margin-bottom: 4px; }
  .info-box .label-en { font-size: 10px; color: #AAA; opacity: 0.8; }
  .info-box .value { font-size: 15px; font-weight: 600; margin-top: 4px; white-space: pre-line; line-height: 1.5; }
  .info-box.warn { border-color: #B23A3A; background: #FFF0F0; }
  .info-box.ok   { border-color: #1F7A1F; background: #F0FFF0; }

  .company-badge {
    display: inline-block;
    background: #1F7A1F;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    margin-top: 4px;
  }

  .camera-section {
    background: #fff;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 16px;
    text-align: center;
  }

  /*
    วิธีที่ work ใน LIFF:
    - button#btnCamera เป็นปุ่มที่ user เห็นและแตะ
    - input#fileInput ซ่อนด้วย position absolute + size 0 + opacity 0
      (ห้ามใช้ display:none หรือ visibility:hidden เพราะทำให้ .click() ไม่ทำงาน)
    - touchend handler เรียก fileInput.click() ใน same-tick ของ touch event
      = LIFF/iOS WebView นับว่าเป็น direct user gesture ไม่บล็อก file picker
    - capture="environment" บังคับกล้องเท่านั้น ไม่มี gallery option
  */
  #btnCamera {
    display: block;
    width: 100%;
    padding: 14px 24px;
    background: #06C755;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
  }
  #btnCamera:active { opacity: 0.85; }

  #fileInput {
    position: absolute;
    width: 0;
    height: 0;
    opacity: 0;
    overflow: hidden;
  }

  .preview {
    width: 100%;
    max-width: 320px;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
  }

  .btn-submit {
    background: #D4550A;
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    width: 100%;
    cursor: pointer;
    margin-top: 8px;
  }
  .btn-submit:disabled { background: #AAA; cursor: not-allowed; }

  #status {
    margin-top: 16px;
    padding: 14px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
    display: none;
    white-space: pre-line;
  }
  #status.show    { display: block; }
  #status.success { background: #1F7A1F; color: #fff; }
  #status.error   { background: #B23A3A; color: #fff; }
  #status.loading { background: #F2A640; color: #fff; }

  .retry-btn {
    background: #D4550A;
    color: #fff;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 8px;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📍 ลงเวลา</h1>
  <div class="header-desc">
    เปิดกล้อง · GPS lock · ฝัง watermark อัตโนมัติ
    <div class="header-en">Camera · GPS · Auto Watermark</div>
  </div>
</div>

<div class="slot-selector">
  <button type="button" class="slot-btn active" data-slot="IN">
    <span class="slot-btn-text">🌅 เข้างาน</span>
    <span class="slot-btn-en">Check In</span>
  </button>
  <button type="button" class="slot-btn" data-slot="LUNCH_OUT">
    <span class="slot-btn-text">🍽️ พักเที่ยง</span>
    <span class="slot-btn-en">Lunch Out</span>
  </button>
  <button type="button" class="slot-btn" data-slot="LUNCH_IN">
    <span class="slot-btn-text">↩️ กลับจากพัก</span>
    <span class="slot-btn-en">Lunch In</span>
  </button>
  <button type="button" class="slot-btn" data-slot="OUT">
    <span class="slot-btn-text">👋 เลิกงาน</span>
    <span class="slot-btn-en">Check Out</span>
  </button>
</div>

<div class="info-box" id="gpsBox">
  <div class="label">
    📡 GPS
    <div class="label-en">Location</div>
  </div>
  <div class="value" id="gpsValue">กำลังขอตำแหน่ง...</div>
  <div id="companyBadge" style="display:none">
    <span class="company-badge">🏢 <?= COMPANY_NAME ?></span>
  </div>
</div>

<div class="camera-section">
  <button type="button" id="btnCamera">📸 ถ่ายรูปสด (กล้องเท่านั้น)</button>

  <!-- ซ่อน input จริงๆ — ถูก trigger โดย touchend ของ btnCamera -->
  <input
    type="file"
    id="fileInput"
    accept="image/jpeg,image/png"
    capture="environment"
  >
  <img id="preview" class="preview" alt="preview">
</div>

<button class="btn-submit" id="btnSubmit" disabled>ส่งลงเวลา</button>

<div id="status"></div>

<script>
  var LIFF_ID        = '<?= LIFF_ID ?>';
  var SCRIPT_URL     = '<?= SCRIPT_URL ?>';
  var COMPANY_NAME   = '<?= COMPANY_NAME ?>';
  var COMPANY_LAT    = <?= COMPANY_LAT ?>;
  var COMPANY_LNG    = <?= COMPANY_LNG ?>;
  var COMPANY_RADIUS = <?= COMPANY_RADIUS ?>;

  var currentSlot  = 'IN';
  var gpsCoords    = null;
  var gpsError     = null;
  var imageBase64  = null;
  var userId       = null;
  var locationName = '';

  /* ── Slot buttons ── */
  document.querySelectorAll('.slot-btn').forEach(function(btn) {
    btn.onclick = function() {
      document.querySelectorAll('.slot-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentSlot = btn.dataset.slot;
    };
  });

  /* ── Camera button — touchend เรียก .click() ใน same-tick ── */
  document.getElementById('btnCamera').addEventListener('touchend', function(e) {
    e.preventDefault();
    document.getElementById('fileInput').click();
  });

  /* ── Fallback สำหรับ desktop (ไม่มี touch) ── */
  document.getElementById('btnCamera').addEventListener('click', function() {
    document.getElementById('fileInput').click();
  });

  /* ── File input ── */
  document.getElementById('fileInput').addEventListener('change', async function(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    await processImage(file);
  });

  /* ── Submit ── */
  document.getElementById('btnSubmit').addEventListener('click', async function() {
    await submitCheckin();
  });

  /* ── LIFF init ── */
  (async function init() {
    try {
      if (!LIFF_ID) { showStatus('❌ ยังไม่ได้ตั้งค่า LIFF_ID', 'error'); return; }
      await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      var profile = await liff.getProfile();
      userId = profile.userId;
      if (!userId) { showStatus('❌ ไม่พบ LINE user id', 'error'); return; }
      requestGPS();
      checkCanSubmit();
    } catch (err) {
      showStatus('❌ LIFF Error: ' + err.message, 'error');
    }
  })();

  /* ── GPS ── */
  function requestGPS() {
    if (!navigator.geolocation) {
      gpsError = 'unsupported';
      document.getElementById('gpsValue').textContent = '❌ อุปกรณ์ไม่รองรับ GPS';
      document.getElementById('gpsBox').classList.add('warn');
      checkCanSubmit();
      return;
    }
    document.getElementById('gpsValue').textContent = '🔄 กำลังค้นหาตำแหน่ง...';
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        gpsCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        gpsError  = null;
        var coordText = gpsCoords.lat.toFixed(5) + ', ' + gpsCoords.lng.toFixed(5);
        var distM = haversine(gpsCoords.lat, gpsCoords.lng, COMPANY_LAT, COMPANY_LNG);
        if (distM <= COMPANY_RADIUS) {
          locationName = COMPANY_NAME;
          document.getElementById('gpsValue').textContent = '✅ ' + COMPANY_NAME + '\n(' + coordText + ')';
          document.getElementById('companyBadge').style.display = 'block';
        } else {
          document.getElementById('companyBadge').style.display = 'none';
          document.getElementById('gpsValue').textContent = '✅ ' + coordText + '\n🔍 กำลังค้นหาชื่อสถานที่...';
          reverseGeocode(gpsCoords.lat, gpsCoords.lng).then(function(name) {
            locationName = name || coordText;
            document.getElementById('gpsValue').textContent = '✅ ' + locationName + '\n(' + coordText + ')';
          }).catch(function() {
            locationName = coordText;
            document.getElementById('gpsValue').textContent = '✅ ' + coordText;
          });
        }
        document.getElementById('gpsBox').classList.remove('warn');
        document.getElementById('gpsBox').classList.add('ok');
        checkCanSubmit();
      },
      function(err) {
        gpsCoords = null;
        gpsError  = err.code === 1 ? 'permission_denied' : err.code === 2 ? 'position_unavailable' : 'timeout';
        document.getElementById('gpsValue').innerHTML =
          '❌ เปิด GPS ไม่สำเร็จ<br><button class="retry-btn" onclick="requestGPS()">ลองใหม่</button>';
        document.getElementById('gpsBox').classList.add('warn');
        checkCanSubmit();
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  function haversine(lat1, lng1, lat2, lng2) {
    var R = 6371000;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLng = (lng2 - lng1) * Math.PI / 180;
    var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function reverseGeocode(lat, lng) {
    return fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&zoom=18&addressdetails=1',
      { headers: { 'Accept-Language': 'th,en' } })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d || !d.address) return null;
        var a = d.address;
        var parts = [
          d.name || a.amenity || a.shop || a.building || a.office || '',
          a.road || a.pedestrian || '',
          a.suburb || a.neighbourhood || '',
          a.city || a.town || a.village || ''
        ].filter(Boolean);
        return parts.slice(0,3).join(', ') || null;
      })
      .catch(function() { return null; });
  }

  /* ── Process image ── */
  async function processImage(file) {
    var img    = await loadImage(file);
    var canvas = document.createElement('canvas');
    var maxW   = 800;
    if (img.width > maxW) {
      canvas.width  = maxW;
      canvas.height = Math.round((maxW / img.width) * img.height);
    } else {
      canvas.width  = img.width;
      canvas.height = img.height;
    }
    var ctx  = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    var barH = Math.max(80, canvas.height * 0.10);
    ctx.fillStyle = 'rgba(0,0,0,0.68)';
    ctx.fillRect(0, canvas.height - barH, canvas.width, barH);

    var now      = new Date();
    var datetime = now.toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' });
    var coordTxt = gpsCoords ? gpsCoords.lat.toFixed(5)+', '+gpsCoords.lng.toFixed(5) : 'GPS unavailable';
    var placeLine = locationName || coordTxt;
    var fontSize  = Math.floor(barH * 0.22);

    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold ' + fontSize + 'px sans-serif';
    ctx.fillText('🕐 ' + datetime,  12, canvas.height - barH + barH * 0.32);
    ctx.fillText('📍 ' + placeLine, 12, canvas.height - barH + barH * 0.60);

    if (locationName && locationName !== coordTxt) {
      ctx.font      = (fontSize - 2) + 'px sans-serif';
      ctx.fillStyle = '#FFD9B3';
      ctx.fillText('    (' + coordTxt + ')', 12, canvas.height - barH + barH * 0.85);
    }

    var dataUrl       = canvas.toDataURL('image/jpeg', 0.65);
    imageBase64       = dataUrl.split(',')[1];
    var preview       = document.getElementById('preview');
    preview.src       = dataUrl;
    preview.style.display = 'block';
    checkCanSubmit();
  }

  function loadImage(file) {
    return new Promise(function(resolve, reject) {
      var reader  = new FileReader();
      reader.onload = function() {
        var img    = new Image();
        img.onload = function() { resolve(img); };
        img.onerror = reject;
        img.src    = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  /* ── Submit ── */
  function checkCanSubmit() {
    document.getElementById('btnSubmit').disabled = !(imageBase64 && userId);
  }

  async function submitCheckin() {
    if (!userId || !imageBase64) return;
    showStatus('⏳ กำลังส่งข้อมูล...', 'loading');
    document.getElementById('btnSubmit').disabled = true;

    var payload = {
      action:       'checkin',
      lineUserId:   userId,
      lat:          gpsCoords ? gpsCoords.lat : 0,
      lng:          gpsCoords ? gpsCoords.lng : 0,
      locationName: locationName || '',
      selfieBase64: imageBase64,
      slot:         currentSlot
    };

    try {
      var res  = await fetch(SCRIPT_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain' },
        body:    JSON.stringify(payload)
      });
      var json = await res.json();
      if (json.ok) {
        showStatus('✅ ลงเวลาเรียบร้อย', 'success');
        setTimeout(function() { if (window.liff) liff.closeWindow(); }, 2500);
      } else {
        showStatus('❌ ' + (json.message || json.error || 'เกิดข้อผิดพลาด'), 'error');
        checkCanSubmit();
      }
    } catch (err) {
      showStatus('❌ ' + err.message, 'error');
      checkCanSubmit();
    }
  }

  function showStatus(text, level) {
    var el = document.getElementById('status');
    el.textContent = text;
    el.className   = 'show ' + level;
  }
</script>
</body>
</html>
