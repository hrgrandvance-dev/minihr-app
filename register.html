<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">

<title>ลงทะเบียน — Mini HR App</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Noto Sans Thai', system-ui, sans-serif;
    background: #FFF8F0;
    padding: 16px;
    color: #1A1A1A;
  }

  .header {
    background: linear-gradient(135deg, #D4550A, #F28C28);
    color: #fff;
    padding: 24px;
    border-radius: 16px;
    margin-bottom: 16px;
  }

  .header h1 {
    font-size: 22px;
  }

  .header p {
    opacity: 0.9;
    font-size: 13px;
    margin-top: 4px;
  }

  .field {
    background: #fff;
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  .field label {
    font-size: 12px;
    color: #777;
    display: block;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .label-en {
    font-size: 10px;
    color: #AAA;
    opacity: 0.8;
    margin-top: 2px;
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  .field input,
  .field select {
    width: 100%;
    border: 1px solid #DDD;
    padding: 10px;
    border-radius: 6px;
    font-size: 15px;
    font-family: inherit;
  }

  .field input:focus,
  .field select:focus {
    border-color: #D4550A;
    outline: none;
  }

  .photo-box {
    background: #fff;
    padding: 16px;
    border-radius: 10px;
    margin-bottom: 10px;
    text-align: center;
  }

  .photo-box .photo-label {
    display: block;
    font-size: 12px;
    color: #777;
    margin-bottom: 8px;
    line-height: 1.3;
    text-align: left;
  }

  /*
    [REAL FIX] ใช้ input ลอยทับปุ่มเต็มพื้นที่ด้วย opacity:0
    ผู้ใช้แตะที่ input โดยตรง ไม่มีการ relay ผ่าน JS เลย
    LIFF จึงถือว่าเป็น direct user gesture และไม่บล็อก
    ห้ามใส่ pointer-events:none เด็ดขาด
  */
  .btn-photo-wrap {
    position: relative;
    width: 100%;
  }

  .btn-photo {
    background: #06C755;
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    pointer-events: none; /* ปุ่มรับ pointer ไม่ได้ เพราะ input ลอยทับอยู่ */
  }

  .btn-photo:active {
    opacity: 0.85;
  }

  .btn-en {
    font-size: 10px;
    opacity: 0.75;
    font-weight: 400;
  }

  /* input ลอยทับเต็ม wrapper — user แตะที่นี่โดยตรง */
  .overlay-file-input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    font-size: 0; /* ซ่อน text เผื่อ browser แสดง */
  }

  .photo-box .preview {
    max-width: 200px;
    margin-top: 10px;
    border-radius: 8px;
    display: none;
  }

  .photo-status {
    font-size: 11px;
    margin-top: 6px;
    padding: 4px 8px;
    border-radius: 4px;
    display: inline-block;
  }

  .photo-status.missing {
    background: #FFF0F0;
    color: #B23A3A;
  }

  .photo-status.ok {
    background: #F0FFF4;
    color: #1F7A1F;
  }

  .btn-submit {
    background: #06C755;
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    width: 100%;
    margin-top: 12px;
    cursor: pointer;
  }

  .btn-submit:disabled {
    background: #AAA;
    cursor: not-allowed;
  }

  #status {
    margin-top: 14px;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    display: none;
  }

  #status.show {
    display: block;
  }

  #status.success {
    background: #1F7A1F;
    color: #fff;
  }

  #status.error {
    background: #B23A3A;
    color: #fff;
  }

  #status.loading {
    background: #F2A640;
    color: #fff;
  }
</style>
</head>

<body>

<div class="header">
  <h1>📝 ลงทะเบียนพนักงาน</h1>
  <p>
    กรอกข้อมูลครั้งเดียวจบ
    <br>
    <span style="font-size:11px;opacity:0.75;">
      Employee Registration
    </span>
  </p>
</div>

<div class="field">
  <label>
    ชื่อ-นามสกุล *
    <div class="label-en">Full Name</div>
  </label>
  <input id="displayName" placeholder="สมชาย ใจดี">
</div>

<div class="field">
  <label>
    เบอร์โทร *
    <div class="label-en">Phone Number</div>
  </label>
  <input id="phone" type="tel" placeholder="0812345678">
</div>

<div class="field">
  <label>
    อีเมล
    <div class="label-en">Email</div>
  </label>
  <input id="email" type="email">
</div>

<div class="field">
  <label>
    แผนก
    <div class="label-en">Department</div>
  </label>
  <input id="department" placeholder="Engineering">
</div>

<div class="field">
  <label>
    ตำแหน่ง
    <div class="label-en">Position</div>
  </label>
  <input id="position" placeholder="Developer">
</div>

<div class="field">
  <label>
    ธนาคาร *
    <div class="label-en">Bank</div>
  </label>
  <select id="bankName">
    <option value="">-- เลือก --</option>
    <option>ไทยพาณิชย์ (SCB)</option>
    <option>กสิกรไทย (KBANK)</option>
    <option>กรุงเทพ (BBL)</option>
    <option>กรุงไทย (KTB)</option>
    <option>กรุงศรี (BAY)</option>
    <option>ทีเอ็มบีธนชาต (TTB)</option>
  </select>
</div>

<div class="field">
  <label>
    เลขที่บัญชี *
    <div class="label-en">Account Number</div>
  </label>
  <input id="bankAccountNo" placeholder="123-4-56789-0">
</div>

<div class="field">
  <label>
    ชื่อบัญชี *
    <div class="label-en">Account Name</div>
  </label>
  <input id="bankAccountName">
</div>

<!-- ===== SELFIE ===== -->
<div class="photo-box">
  <div class="photo-label">
    📸 ภาพใบหน้า (selfie) *
    <div class="label-en">Selfie Photo (required)</div>
  </div>

  <!--
    [REAL FIX] input ลอยทับปุ่มเต็มพื้นที่ opacity:0 ไม่มี pointer-events:none
    user แตะที่ input โดยตรง = LIFF ถือว่าเป็น direct gesture ไม่บล็อก
    accept="image/*" ไม่มี capture = เปิดทั้งกล้องและแกลเลอรี
  -->
  <div class="btn-photo-wrap">
    <button type="button" class="btn-photo">
      <span>📷 ถ่ายรูป / เลือกจากคลัง</span>
      <span class="btn-en">Take Photo or Choose from Gallery</span>
    </button>
    <input
      type="file"
      id="fileSelfie"
      accept="image/*"
      class="overlay-file-input"
    >
  </div>

  <img id="previewSelfie" class="preview" alt="">
  <div id="statusSelfie" class="photo-status missing">⚠️ ยังไม่ได้ถ่ายรูป</div>
</div>

<!-- ===== ID CARD ===== -->
<div class="photo-box">
  <div class="photo-label">
    🆔 บัตรประชาชน *
    <div class="label-en">ID Card (required)</div>
  </div>

  <!--
    [REAL FIX] เหมือนกัน — input ลอยทับปุ่ม
    accept="image/*" ไม่มี capture = เปิดทั้งกล้องและแกลเลอรี
  -->
  <div class="btn-photo-wrap">
    <button type="button" class="btn-photo">
      <span>🆔 ถ่ายรูป / เลือกจากคลัง</span>
      <span class="btn-en">Take Photo or Choose from Gallery</span>
    </button>
    <input
      type="file"
      id="fileIdCard"
      accept="image/*"
      class="overlay-file-input"
    >
  </div>

  <img id="previewIdCard" class="preview" alt="">
  <div id="statusIdCard" class="photo-status missing">⚠️ ยังไม่ได้ถ่ายรูป</div>
</div>

<button class="btn-submit" id="btnSubmit" disabled>
  ลงทะเบียน
</button>

<div id="status"></div>

<script>

const LIFF_ID = '2010077723-E2aMyxKF';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBkocmZN1yPzozv74oJAq3-qbKky0-KM9a1ZTUrajg6Qh5eaJIikrB4vJcttXr_UWS/exec';

let userId = null;
let selfieBase64 = null;
let idCardBase64 = null;

(async function init() {
  try {
    await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;
    checkCanSubmit();

  } catch (err) {
    showStatus('❌ LIFF ERROR: ' + err.message, 'error');
  }
})();

/* ─── เมื่อรับรูป Selfie ─── */
document.getElementById('fileSelfie').addEventListener('change', async function(e) {
  if (!e.target.files || e.target.files.length === 0) return;
  try {
    selfieBase64 = await resizeAndEncode(e.target.files[0]);
    document.getElementById('previewSelfie').src = 'data:image/jpeg;base64,' + selfieBase64;
    document.getElementById('previewSelfie').style.display = 'block';
    document.getElementById('statusSelfie').textContent = '✅ เลือกรูปแล้ว';
    document.getElementById('statusSelfie').className = 'photo-status ok';
    checkCanSubmit();
  } catch(err) {
    showStatus('❌ ไม่สามารถอ่านรูป selfie ได้: ' + err.message, 'error');
  }
});

/* ─── เมื่อรับรูป ID Card ─── */
document.getElementById('fileIdCard').addEventListener('change', async function(e) {
  if (!e.target.files || e.target.files.length === 0) return;
  try {
    idCardBase64 = await resizeAndEncode(e.target.files[0]);
    document.getElementById('previewIdCard').src = 'data:image/jpeg;base64,' + idCardBase64;
    document.getElementById('previewIdCard').style.display = 'block';
    document.getElementById('statusIdCard').textContent = '✅ เลือกรูปแล้ว';
    document.getElementById('statusIdCard').className = 'photo-status ok';
    checkCanSubmit();
  } catch(err) {
    showStatus('❌ ไม่สามารถอ่านรูปบัตรประชาชนได้: ' + err.message, 'error');
  }
});

/* ─── Resize + Encode เป็น base64 ─── */
async function resizeAndEncode(file) {
  const img = await new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onload = function() {
      const image = new Image();
      image.onload = function() { resolve(image); };
      image.onerror = reject;
      image.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  const canvas = document.createElement('canvas');
  const maxW = 400;
  const scale = img.width > maxW ? maxW / img.width : 1;
  canvas.width  = Math.round(img.width  * scale);
  canvas.height = Math.round(img.height * scale);
  canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
}

/* ─── ตรวจสอบว่า submit ได้หรือยัง ─── */
function checkCanSubmit() {
  const req = ['displayName', 'phone', 'bankName', 'bankAccountNo', 'bankAccountName'];
  const allFilled = req.every(function(id) {
    return document.getElementById(id).value.trim();
  });
  const canSubmit = allFilled && !!userId && !!selfieBase64 && !!idCardBase64;
  document.getElementById('btnSubmit').disabled = !canSubmit;
}

document.querySelectorAll('input,select').forEach(function(el) {
  el.addEventListener('input',  checkCanSubmit);
  el.addEventListener('change', checkCanSubmit);
});

/* ─── Submit ─── */
document.getElementById('btnSubmit').addEventListener('click', async function() {
  if (!userId) {
    showStatus('❌ LINE User ไม่พร้อม กรุณาเปิดใหม่จาก LINE', 'error');
    return;
  }
  if (!selfieBase64 || !idCardBase64) {
    showStatus('❌ กรุณาถ่ายรูปให้ครบทั้ง 2 รูป', 'error');
    return;
  }

  showStatus('⏳ กำลังส่งข้อมูล อาจใช้เวลา 30-60 วินาที...', 'loading');
  document.getElementById('btnSubmit').disabled = true;

  const payload = {
    action:          'register',
    lineUserId:      userId,
    displayName:     document.getElementById('displayName').value.trim(),
    phone:           document.getElementById('phone').value.trim(),
    email:           document.getElementById('email').value.trim(),
    department:      document.getElementById('department').value.trim(),
    position:        document.getElementById('position').value.trim(),
    bankName:        document.getElementById('bankName').value,
    bankAccountNo:   document.getElementById('bankAccountNo').value.trim(),
    bankAccountName: document.getElementById('bankAccountName').value.trim(),
    selfieBase64:    selfieBase64,
    idCardBase64:    idCardBase64
  };

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });

    const json = await res.json();

    if (json.ok) {
      showStatus('✅ ลงทะเบียนเรียบร้อย รหัส: ' + json.employeeId, 'success');
      setTimeout(function() {
        if (liff.isInClient()) liff.closeWindow();
      }, 2500);
    } else {
      showStatus('❌ ' + (json.message || json.error || 'เกิดข้อผิดพลาด'), 'error');
      document.getElementById('btnSubmit').disabled = false;
    }

  } catch(err) {
    showStatus('❌ ' + (err.message || 'เกิดข้อผิดพลาดในการเชื่อมต่อ'), 'error');
    document.getElementById('btnSubmit').disabled = false;
  }
});

function showStatus(text, level) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'show ' + level;
}

</script>

</body>
</html>
